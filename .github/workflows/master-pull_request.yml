name: test-on-merge-to-aster
on: 
 pull_request:
  types:  closed
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get project
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Start linter
        run: npm run lint
  typescript-check:
    runs-on: ubuntu-latest
    steps:
      - name: Get project
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Install dependencies
        run: npm run tslint
  build-test:
    needs: [lint, typescript-check]
    strategy:
      matrix:
        node-version: [16, 18]
    runs-on: ubuntu-latest
    steps:
      - name: Get project
        uses: actions/checkout@v3
      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
         node-version: ${{ matrix.node-version }} 
      - name: Install dependencies
        run: npm ci
      - name: Project build
        run: npm run build