name: test-on-push
on: 
  push:
   branches:
    - '*'
    - '!master'
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get project
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Start linter
        run: npm run lint
  typescript-check:
    runs-on: ubuntu-latest
    steps:
      - name: Get project
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Install dependencies
        run: npm run tslint
  build-test:
    runs-on: ubuntu-latest
    needs: [lint, typescript-check]
    steps:
      - name: Get project
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Project build
        run: npm run build